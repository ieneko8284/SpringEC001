<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン - SpringEC</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="login-container">
        <h2>ログイン</h2>
		
		<div th:if="${param.register_success}" 
		     style="color: green; background-color: #d4edda; border: 1px solid #c3e6cb; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 14px;">
		    ユーザー登録が完了しました！ログインしてください。
		</div>
		
        <div th:if="${param.error}" class="error-message">
            ユーザー名かパスワードが違います。
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>ユーザー名</label>
                <input type="text" name="username" required placeholder="ユーザー名を入力" />
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" name="password" required placeholder="パスワードを入力" />
            </div>
            <button type="submit">ログイン</button>
        </form>
        
        <a th:href="@{/items}" class="back-link">商品一覧に戻る</a>
    </div>
</body>
</html>
