# 1. 接続先のURL（さっき作ったスキーマ名：springec001 を指定）
spring.datasource.url=jdbc:mysql://localhost:3306/springec001?useSSL=false&serverTimezone=Asia/Tokyo

# 2. MySQLのユーザー名（デフォルトは root が多いよ）
spring.datasource.username=root

# 3. MySQLのパスワード（自分がMySQLをインストールした時に決めたもの）
spring.datasource.password=next123
# 4. MySQL用のドライバクラスの指定
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 5. SQLをコンソールに表示する設定（学習用に超便利！）
logging.level.org.springframework.jdbc.core=DEBUG